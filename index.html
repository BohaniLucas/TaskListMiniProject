<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Task Manager</title>

    </head>

    <body>

        <h1>Daily Tasks</h1>

        <input type="text" id="taskInput" placeholder="Enter a task">
        <button id="addBtn">Add Task</button>

        <p>Total Tasks: <span id="total">0</span></p>
        <p>Completed Tasks: <span id="completed">0</span></p>

        <ul id="taskList">
        </ul>

        <p>Instructions:</p>
        <ul>
        <li>Click a task to mark it complete</li>
        <li>Click a task again to delete it</li>
        </ul>

        <script src="main.js"></script>

    </body>
</html>
